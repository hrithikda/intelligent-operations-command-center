name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn pandas numpy scikit-learn torch \
            lightgbm sentence-transformers chromadb sqlalchemy mlflow \
            pydantic pydantic-settings python-dotenv httpx anthropic \
            pytest pytest-asyncio

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v
